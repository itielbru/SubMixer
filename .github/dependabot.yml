version: 2
updates:
  # npm dependencies — group minor/patch bumps to reduce PR noise; security
  # updates still open their own PRs immediately.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dev-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
      prod-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch

  # GitHub Actions used in workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
