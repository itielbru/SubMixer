name: Release

# Two-phase release:
#   workflow_dispatch → creates the version tag → triggers push:tags → builds installer
#   push:tags (v*)    → full build + publish to GitHub Releases
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Phase 1: create the git tag (workflow_dispatch only)
  create-tag:
    name: Create version tag
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push version tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v$VERSION" -m "Release v$VERSION" 2>/dev/null || echo "tag v$VERSION already exists"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "v$VERSION" 2>/dev/null || echo "tag already on remote"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Phase 2: build + publish (tag push only)
  release:
    name: Build and publish (Windows)
    if: github.event_name == 'push'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch FFmpeg binaries
        run: npm run setup:ffmpeg

      - name: Quality gates
        run: |
          npm run typecheck
          npm run lint
          npm test

      - name: Build bundle
        run: npx electron-vite build

      - name: Package and publish to GitHub Releases
        shell: pwsh
        run: |
          if ($env:CSC_LINK_SECRET) {
            $env:CSC_LINK = $env:CSC_LINK_SECRET
            $env:CSC_KEY_PASSWORD = $env:CSC_KEY_PASSWORD_SECRET
          }
          npx electron-builder --win nsis portable --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK_SECRET: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD_SECRET: ${{ secrets.CSC_KEY_PASSWORD }}
