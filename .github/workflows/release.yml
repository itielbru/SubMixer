name: Release

# Run via workflow_dispatch from GitHub Actions UI or API.
# The job creates the version tag, then builds and publishes the Windows installer.
# GITHUB_REF is overridden for electron-builder so it sees a tag context even
# though the run was triggered from a branch.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: ver
        shell: pwsh
        run: |
          $v = node -e "process.stdout.write(require('./package.json').version)"
          "version=$v" | Out-File -Append $env:GITHUB_OUTPUT -Encoding utf8

      - name: Create and push git tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.ver.outputs.version }}" -m "Release v${{ steps.ver.outputs.version }}" 2>/dev/null \
            || echo "tag already exists, continuing"
          git push \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "v${{ steps.ver.outputs.version }}" 2>/dev/null \
            || echo "tag already on remote, continuing"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch FFmpeg binaries
        run: npm run setup:ffmpeg

      - name: Quality gates
        run: |
          npm run typecheck
          npm run lint
          npm test

      - name: Build bundle
        run: npx electron-vite build

      - name: Package and publish to GitHub Releases
        shell: pwsh
        run: |
          if ($env:CSC_LINK_SECRET) {
            $env:CSC_LINK = $env:CSC_LINK_SECRET
            $env:CSC_KEY_PASSWORD = $env:CSC_KEY_PASSWORD_SECRET
          }
          npx electron-builder --win nsis portable --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tell electron-builder we are publishing a tagged release
          GITHUB_REF: refs/tags/v${{ steps.ver.outputs.version }}
          CSC_LINK_SECRET: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD_SECRET: ${{ secrets.CSC_KEY_PASSWORD }}
