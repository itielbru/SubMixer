name: Release

# Publish a signed (if a cert is configured) Windows build to GitHub Releases
# whenever a version tag is pushed, e.g. `git tag v1.1.0 && git push --tags`.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # required to create/upload the GitHub Release

jobs:
  release:
    name: Build and publish (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch FFmpeg binaries
        run: npm run setup:ffmpeg

      - name: Quality gates
        run: |
          npm run typecheck
          npm run lint
          npm test

      - name: Build bundle
        run: npx electron-vite build

      - name: Package and publish to GitHub Releases
        shell: pwsh
        run: |
          # Enable code signing only when a certificate secret is actually set.
          # An empty CSC_LINK makes electron-builder fail trying to resolve it as
          # a file path, so we set the signing vars conditionally.
          if ($env:CSC_LINK_SECRET) {
            $env:CSC_LINK = $env:CSC_LINK_SECRET
            $env:CSC_KEY_PASSWORD = $env:CSC_KEY_PASSWORD_SECRET
          }
          npx electron-builder --win nsis portable --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Populate these repo secrets to produce signed builds; left unset,
          # builds are unsigned (no signing is attempted).
          CSC_LINK_SECRET: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD_SECRET: ${{ secrets.CSC_KEY_PASSWORD }}
