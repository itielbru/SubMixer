appId: com.itiel.submixer
productName: SubMixer
copyright: Copyright © 2026 Itiel
# Local builds without a cert; avoids pulling winCodeSign (7z + symlinks need Admin or Developer Mode)
forceCodeSigning: false
asar: true
compression: maximum
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
  - "!**/*.map"
  - "!**/*.ts"
extraResources:
  - from: ffmpeg-bin
    to: ffmpeg
    filter:
      - "**/*"
extraMetadata:
  main: out/main/index.js
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  artifactName: ${productName}-${version}-${arch}.${ext}
  signAndEditExecutable: false
  verifyUpdateCodeSignature: false
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SubMixer
portable:
  artifactName: ${productName}-${version}-portable.${ext}
fileAssociations:
  - ext: mkv
    description: Matroska Video
    role: Editor
  - ext: mp4
    description: MPEG-4 Video
    role: Editor
# Auto-update feed. electron-builder generates latest.yml on build and uploads
# artifacts to GitHub Releases when invoked with `--publish always` (see the
# release workflow). Code signing activates automatically when CSC_LINK /
# CSC_KEY_PASSWORD are present; once signing is in place, set
# verifyUpdateCodeSignature: true above for secure update verification.
publish:
  provider: github
  owner: itielbru
  repo: SubMixer
